---
- vars:
    elastic_index_parameters: &elastic_index_parameters
      timeout: 30

  block:

  - name: Create an api key
    community.elastic.elastic_api_key:
      name: myAPIKey
      <<: *elastic_index_parameters
    register: myAPIKey

  - name: Show results
    ansible.builtin.debug:
      var: myAPIKey

  - name: Delete an api key - check mode
    community.elastic.elastic_api_key:
      name: myAPIKey
      <<: *elastic_index_parameters
    check_mode: true
    register: myAPIKey

  - name: Show results
    ansible.builtin.debug:
      var: myAPIKey

  - name: Delete an api key
    community.elastic.elastic_api_key:
      name: myAPIKey
      <<: *elastic_index_parameters
    register: myAPIKey

  - name: Show results
    ansible.builtin.debug:
      var: myAPIKey

